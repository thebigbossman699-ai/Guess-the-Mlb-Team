<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guess The Team</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="banner">

    <div class="logo">
        ⚾
    </div>

    <div>

        <h1>GUESS THE TEAM</h1>

        <h2>BY THEIR JERSEY NUMBERS</h2>

    </div>

</div>



<div class="stats">

<div class="stat">

<h3>SCORE</h3>

<p id="score">0</p>

</div>

<div class="stat">

<h3>PROGRESS</h3>

<p id="progress">0 / 30</p>

</div>

<div class="stat">

<h3>ACCURACY</h3>

<p id="accuracy">0%</p>

</div>

<div class="stat">

<h3>TIME</h3>

<p id="timer">60</p>

</div>

</div>





<div class="field">



<div class="card cf">

<label>CF</label>

<div id="CF">?</div>

</div>



<div class="card lf">

<label>LF</label>

<div id="LF">?</div>

</div>



<div class="card rf">

<label>RF</label>

<div id="RF">?</div>

</div>



<div class="card ss">

<label>SS</label>

<div id="SS">?</div>

</div>



<div class="card second">

<label>2B</label>

<div id="2B">?</div>

</div>



<div class="card third">

<label>3B</label>

<div id="3B">?</div>

</div>



<div class="card first">

<label>1B</label>

<div id="1B">?</div>

</div>



<div class="card ace">

<label>ACE</label>

<div id="P">?</div>

</div>



<div class="card catcher">

<label>C</label>

<div id="C">?</div>

</div>



<div class="card dh">

<label>DH</label>

<div id="DH">?</div>

</div>



<div class="card team">

<label>TEAM</label>

<div id="teamBox">?</div>

</div>



</div>





<div class="controls">

<input

id="guessInput"

type="text"

placeholder="Guess MLB Team Name..."

autocomplete="off"

>

<button id="guessBtn">

GUESS

</button>

</div>



<div class="buttons">

<button id="hintBtn">

💡 Hint

</button>

<button id="revealBtn">

👁 Reveal

</button>

<button id="nextBtn">

➡ Next Team

</button>

</div>



<h2 id="message"></h2>





<div class="players">

<h2>

CORRECT PLAYERS

</h2>

<div id="playerList">

</div>

</div>





<script src="teams.js"></script>

<script src="script.js"></script>

</body>

</html>
