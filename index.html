<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The MLB Team</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="banner">
        <h1>GUESS THE TEAM</h1>
        <p>BY THEIR JERSEY NUMBERS</p>
    </div>

    <div class="field">

        <div class="position cf">
            <span class="label">CF</span>
            <div class="card">25</div>
        </div>

        <div class="position lf">
            <span class="label">LF</span>
            <div class="card">9</div>
        </div>

        <div class="position rf">
            <span class="label">RF</span>
            <div class="card">15</div>
        </div>

        <div class="position ss">
            <span class="label">SS</span>
            <div class="card">4</div>
        </div>

        <div class="position second">
            <span class="label">2B</span>
            <div class="card">2</div>
        </div>

        <div class="position third">
            <span class="label">3B</span>
            <div class="card">22</div>
        </div>

        <div class="position first">
            <span class="label">1B</span>
            <div class="card">23</div>
        </div>

        <div class="position ace">
            <span class="label">ACE</span>
            <div class="card">41</div>
        </div>

        <div class="position catcher">
            <span class="label">C</span>
            <div class="card">27</div>
        </div>

        <div class="position dh">
            <span class="label">DH</span>
            <div class="card">56</div>
        </div>

        <div class="position team">
            <span class="label">TEAM</span>
            <div class="card question">?</div>
        </div>

    </div>

    <div class="guess-box">
        <input type="text" id="teamInput" placeholder="Enter MLB team">
        <button onclick="checkGuess()">Guess</button>
        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
